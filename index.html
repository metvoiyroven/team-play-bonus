<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Case Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        /* Основной стиль */
        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            user-select: none;
        }

        .container { max-width: 500px; margin: 0 auto; }

        /* Плашка баланса */
        .header-card {
            background: linear-gradient(145deg, #1a1a1a, #111);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #333;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .balance-label { font-size: 14px; color: #888; text-transform: uppercase; }
        .balance-value { font-size: 32px; font-weight: bold; color: #ffca28; text-shadow: 0 0 10px rgba(255,202,40,0.3); }

        /* Рулетка */
        #roulette {
            position: relative;
            width: 100%;
            height: 100px;
            overflow: hidden;
            background: #050505;
            border: 2px solid #333;
            border-radius: 12px;
            margin: 20px 0;
            display: none; /* Появляется при открытии */
        }

        #roulette::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 0;
            width: 3px;
            height: 100%;
            background: #ff4444;
            z-index: 10;
            box-shadow: 0 0 15px #ff4444;
        }

        #track {
            display: flex;
            align-items: center;
            height: 100%;
            will-change: transform;
        }

        .roulette-item {
            min-width: 100px;
            height: 70px;
            margin: 0 5px;
            background: #1a1a1a;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
        }

        /* Кнопки */
        .main-btn {
            background: linear-gradient(180deg, #ffca28, #ffa000);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(255,160,0,0.3);
        }

        .main-btn:disabled { background: #333; color: #666; box-shadow: none; }

        .tabs { display: flex; gap: 10px; margin-top: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: #ccc; border-radius: 10px; }

        /* Инвентарь */
        .list-item {
            background: #151515;
            padding: 12px;
            border-radius: 10px;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #ffca28;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <div class="balance-label">Твой баланс</div>
        <div id="balance-val" class="balance-value">Загрузка...</div>
        <div id="user-name" style="margin-top: 5px; color: #666;"></div>
    </div>

    <div id="roulette">
        <div id="track"></div>
    </div>

    <button id="open-btn" class="main-btn" onclick="openCase()">ОТКРЫТЬ КЕЙС (100 ⭐️)</button>

    <div class="tabs">
        <button class="tab-btn" onclick="showSection('inv')">Инвентарь</button>
        <button class="tab-btn" onclick="showSection('top')">Топ</button>
        <button class="tab-btn" onclick="getDailyBonus()" id="bonus-btn">Бонус</button>
    </div>

    <div id="inventory-section" style="margin-top: 20px; text-align: left;">
        <h3>Ваши предметы:</h3>
        <div id="inv-list"></div>
    </div>
</div>

<script>
    // --- КОНФИГУРАЦИЯ FIREBASE ---
    const firebaseConfig = {
        apiKey: "ТВОЙ_API_KEY",
        authDomain: "teamplaybonus.firebaseapp.com",
        projectId: "teamplaybonus",
        storageBucket: "teamplaybonus.appspot.com",
        messagingSenderId: "ТВОЙ_ОТПРАВИТЕЛЬ",
        appId: "ТВОЙ_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const userId = tg.initDataUnsafe?.user?.id?.toString() || "debug_123";
    const userRef = db.collection("players").doc(userId);

    const PRIZES = ["10 ⭐️", "20 ⭐️", "50 ⭐️", "150 ⭐️", "Ключ", "VIP", "5 ⭐️"];

    // Синхронизация данных
    function sync() {
        userRef.onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('balance-val').innerText = (data.stars || 0) + " ⭐️";
                document.getElementById('user-name').innerText = data.name || "Игрок";
                renderInventory(data.inventory || []);
            } else {
                userRef.set({ 
                    stars: 500, 
                    name: tg.initDataUnsafe?.user?.first_name || "Новичок",
                    inventory: [],
                    lastBonus: 0
                });
            }
        });
    }

    // Открытие кейса
    async function openCase() {
        const doc = await userRef.get();
        const stars = doc.data().stars || 0;

        if (stars < 100) {
            tg.showAlert("Недостаточно звезд!");
            return;
        }

        const win = PRIZES[Math.floor(Math.random() * PRIZES.length)];
        const track = document.getElementById('track');
        const roulette = document.getElementById('roulette');
        const btn = document.getElementById('open-btn');

        btn.disabled = true;
        roulette.style.display = 'block';

        // Создаем ленту
        let html = "";
        for (let i = 0; i < 60; i++) {
            let item = (i === 45) ? win : PRIZES[Math.floor(Math.random() * PRIZES.length)];
            html += `<div class="roulette-item">${item}</div>`;
        }
        track.innerHTML = html;
        track.style.transition = 'none';
        track.style.transform = 'translateX(0px)';

        setTimeout(() => {
            const itemWidth = 110;
            const stopPos = (45 * itemWidth) - (roulette.offsetWidth / 2) + (itemWidth / 2);
            track.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
            track.style.transform = `translateX(-${stopPos}px)`;
        }, 50);

        setTimeout(async () => {
            let winValue = win.includes("⭐️") ? parseInt(win) : 0;
            await userRef.update({
                stars: firebase.firestore.FieldValue.increment(winValue - 100),
                inventory: firebase.firestore.FieldValue.arrayUnion({
                    id: Date.now(),
                    title: win,
                    date: new Date().toLocaleDateString()
                })
            });
            tg.showAlert("Выпало: " + win);
            btn.disabled = false;
        }, 5500);
    }

    function renderInventory(items) {
        const list = document.getElementById('inv-list');
        list.innerHTML = items.reverse().map(i => `
            <div class="list-item">
                <span>${i.title}</span>
                <small style="color: #666;">${i.date}</small>
            </div>
        `).join('');
    }

    async function getDailyBonus() {
        const btn = document.getElementById('bonus-btn');
        btn.disabled = true;
        await userRef.update({ stars: firebase.firestore.FieldValue.increment(50) });
        tg.showAlert("Вы получили ежедневный бонус 50 ⭐️!");
    }

    function showSection(type) {
        if(type === 'top') {
            tg.showAlert("Топ игроков в разработке!");
        }
    }

    sync();
</script>

</body>
</html>
